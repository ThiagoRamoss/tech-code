$kind: http-request
method: PUT
url: '{{baseUrl}}/idcards/:id'
order: 4000
pathVariables:
  - key: id
    value: '{{idCardId}}'
    description: ID Card UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nickname": "updatedCoder",
      "level": 5,
      "experience": 1500,
      "badges": ["first_login", "first_code", "level_5"]
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });
