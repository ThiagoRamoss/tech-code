$kind: http-request
method: PUT
url: '{{baseUrl}}/contents/:id'
order: 4000
pathVariables:
  - key: id
    value: '{{contentId}}'
    description: Content UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated: Introduction to Variables",
      "body": "Updated content about variables...",
      "roadmapId": "{{roadmapId}}"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });
