$kind: http-request
method: PUT
url: '{{baseUrl}}/glossary/:id'
order: 4000
pathVariables:
  - key: id
    value: '{{glossaryId}}'
    description: Glossary term UUID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "term": "Variable",
      "definition": "Updated: A named storage location in memory that holds a value which can be changed during program execution"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response is JSON", function () {
          pm.response.to.have.header("Content-Type", /application\/json/);
      });
