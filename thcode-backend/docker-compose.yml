services:
  postgres:
    image: postgres:15-alpine
    container_name: techcode-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suasenha
      POSTGRES_DB: techcode_db
    volumes:
      - techcode-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: techcode-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  techcode-db-data: